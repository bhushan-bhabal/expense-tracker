{% extends "base.html" %}

{% block content %}

<a href="/"><button class="back">← Back</button></a>

<div class="card">

<h2>Edit Expense</h2>

<form method="POST">

<label>Category</label>

<select name="category_id" required>

{% for category in categories %}

<option value="{{ category.id }}"
{% if category.id == expense.category_id %}
selected
{% endif %}
>
{{ category.name }}
</option>

{% endfor %}

</select>

<label>Amount</label>
<input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required>

<label>Description</label>
<input type="text" name="description" value="{{ expense.description }}">

<label>Date</label>
<input type="date" name="expense_date" value="{{ expense.expense_date }}" required onclick="this.showPicker()">

<button type="submit">Update Expense</button>

</form>

</div>

{% endblock %}
